<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自适应学习五子棋AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #1e9b5e 100%);
            min-height: 100vh;
            color: #fff;
            overflow-x: hidden;
        }

        .container {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
            gap: 30px;
            min-height: 100vh;
        }

        /* 左侧游戏区域 */
        .game-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            background: linear-gradient(to right, #fff, #a8edea);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .status-panel {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px 30px;
            border-radius: 50px;
            margin-bottom: 25px;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 15px;
            border: 2px solid rgba(255,255,255,0.2);
        }

        .turn-indicator {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: inline-block;
            box-shadow: 0 0 10px currentColor;
        }

        .turn-indicator.black {
            background: #000;
            color: #000;
        }

        .turn-indicator.white {
            background: #fff;
            color: #fff;
        }

        .board-container {
            position: relative;
            background: linear-gradient(145deg, #deb887, #c9a86c);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 
                0 10px 30px rgba(0,0,0,0.5),
                inset 0 2px 10px rgba(255,255,255,0.3);
        }

        #board {
            display: grid;
            grid-template-columns: repeat(15, 35px);
            grid-template-rows: repeat(15, 35px);
            gap: 0;
            position: relative;
        }

        .cell {
            width: 35px;
            height: 35px;
            position: relative;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .cell::before,
        .cell::after {
            content: '';
            position: absolute;
            background: #8b4513;
            opacity: 0.6;
        }

        .cell::before {
            width: 100%;
            height: 1px;
            top: 50%;
            left: 0;
        }

        .cell::after {
            width: 1px;
            height: 100%;
            left: 50%;
            top: 0;
        }

        .cell:hover::before {
            background: #ff6b6b;
            opacity: 1;
            height: 2px;
        }

        .cell:hover::after {
            background: #ff6b6b;
            opacity: 1;
            width: 2px;
        }

        .piece {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            position: absolute;
            z-index: 10;
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            box-shadow: 
                2px 2px 5px rgba(0,0,0,0.3),
                inset -2px -2px 5px rgba(0,0,0,0.2),
                inset 2px 2px 5px rgba(255,255,255,0.3);
        }

        .piece.black {
            background: radial-gradient(circle at 30% 30%, #4a4a4a, #000);
        }

        .piece.white {
            background: radial-gradient(circle at 30% 30%, #fff, #e0e0e0);
        }

        .piece.last-move {
            box-shadow: 
                0 0 15px #ffd700,
                2px 2px 5px rgba(0,0,0,0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* 右侧控制面板 */
        .control-panel {
            width: 350px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .panel-title {
            font-size: 1.5rem;
            margin-bottom: 10px;
            text-align: center;
            border-bottom: 2px solid rgba(255,255,255,0.3);
            padding-bottom: 15px;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        button {
            padding: 15px 20px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.6);
        }

        .btn-success {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(17, 153, 142, 0.4);
        }

        .btn-success:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(17, 153, 142, 0.6);
        }

        .btn-warning {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(240, 147, 251, 0.4);
        }

        .btn-warning:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(240, 147, 251, 0.6);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a6f 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 107, 0.4);
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 107, 0.6);
        }

        .stats-card {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .stats-card h3 {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: #a8edea;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .stat-item:last-child {
            border-bottom: none;
        }

        .stat-value {
            font-weight: bold;
            color: #ffd700;
            font-size: 1.2rem;
        }

        .learning-status {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .status-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: bold;
            margin-top: 10px;
        }

        .status-active {
            background: rgba(56, 239, 125, 0.3);
            color: #38ef7d;
            border: 1px solid #38ef7d;
        }

        .status-inactive {
            background: rgba(255, 107, 107, 0.3);
            color: #ff6b6b;
            border: 1px solid #ff6b6b;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #38ef7d, #11998e);
            border-radius: 4px;
            transition: width 0.5s ease;
            box-shadow: 0 0 10px rgba(56, 239, 125, 0.5);
        }

        .thinking-indicator {
            display: none;
            align-items: center;
            gap: 10px;
            color: #ffd700;
            font-size: 0.9rem;
            margin-top: 10px;
        }

        .thinking-indicator.active {
            display: flex;
        }

        .dots {
            display: flex;
            gap: 4px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #ffd700;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        @media (max-width: 1024px) {
            .container {
                flex-direction: column;
            }
            .control-panel {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 左侧游戏区域 -->
        <div class="game-section">
            <h1>自适应学习五子棋AI</h1>
            
            <div class="status-panel">
                <span>当前回合：</span>
                <span id="turnIndicator" class="turn-indicator black"></span>
                <span id="statusText">黑棋（玩家）思考中...</span>
            </div>

            <div class="board-container">
                <div id="board"></div>
            </div>

            <div class="thinking-indicator" id="thinkingIndicator">
                <span>AI正在思考最佳策略</span>
                <div class="dots">
                    <div class="dot"></div>
                    <div class="dot"></div>
                    <div class="dot"></div>
                </div>
            </div>
        </div>

        <!-- 右侧控制面板 -->
        <div class="control-panel">
            <div class="panel-title">🎮 控制中心</div>
            
            <div class="btn-group">
                <button class="btn-primary" onclick="game.newGame()">
                    <span>🔄</span> 新游戏
                </button>
                <button class="btn-success" id="learningBtn" onclick="game.toggleLearning()">
                    <span>🧠</span> 启用学习模式
                </button>
                <button class="btn-warning" onclick="game.trainAI()">
                    <span>⚡</span> 训练AI
                </button>
                <button class="btn-danger" onclick="game.resetKnowledge()">
                    <span>🗑️</span> 重置AI知识
                </button>
            </div>

            <div class="stats-card">
                <h3>📊 对战统计</h3>
                <div class="stat-item">
                    <span>总对局数</span>
                    <span class="stat-value" id="totalGames">0</span>
                </div>
                <div class="stat-item">
                    <span>AI胜利次数</span>
                    <span class="stat-value" id="aiWins">0</span>
                </div>
                <div class="stat-item">
                    <span>玩家胜利次数</span>
                    <span class="stat-value" id="playerWins">0</span>
                </div>
                <div class="stat-item">
                    <span>平局次数</span>
                    <span class="stat-value" id="draws">0</span>
                </div>
                <div class="stat-item">
                    <span>AI胜率</span>
                    <span class="stat-value" id="aiWinRate">0%</span>
                </div>
            </div>

            <div class="learning-status">
                <h3>🎯 AI学习状态</h3>
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <span>学习模式</span>
                    <span id="learningStatus" class="status-badge status-inactive">已禁用</span>
                </div>
                
                <div style="margin-top: 15px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                        <span>学习进度</span>
                        <span id="learningProgress">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="progressBar" style="width: 0%"></div>
                    </div>
                </div>

                <div style="margin-top: 15px;">
                    <span>已学习策略数：</span>
                    <span class="stat-value" id="strategyCount">0</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        class AdaptiveGomokuAI {
            constructor() {
                this.boardSize = 15;
                this.board = [];
                this.currentPlayer = 1; // 1: 黑棋(玩家), 2: 白棋(AI)
                this.gameOver = false;
                this.lastMove = null;
                this.moveHistory = [];
                
                // 学习系统
                this.learningEnabled = false;
                this.knowledgeBase = {
                    patterns: {},
                    positionValues: {},
                    strategies: [],
                    gameResults: []
                };
                this.learningStats = {
                    totalGames: 0,
                    aiWins: 0,
                    playerWins: 0,
                    draws: 0,
                    strategiesLearned: 0
                };

                // 棋型评分
                this.patternScores = {
                    'five': 100000,
                    'open_four': 10000,
                    'closed_four': 1000,
                    'open_three': 1000,
                    'closed_three': 100,
                    'open_two': 100,
                    'closed_two': 10
                };

                this.initBoard();
                this.loadKnowledge();
            }

            initBoard() {
                const boardEl = document.getElementById('board');
                boardEl.innerHTML = '';
                this.board = Array(this.boardSize).fill().map(() => Array(this.boardSize).fill(0));
                
                for (let i = 0; i < this.boardSize; i++) {
                    for (let j = 0; j < this.boardSize; j++) {
                        const cell = document.createElement('div');
                        cell.className = 'cell';
                        cell.dataset.row = i;
                        cell.dataset.col = j;
                        cell.onclick = () => this.handleClick(i, j);
                        boardEl.appendChild(cell);
                    }
                }
            }

            handleClick(row, col) {
                if (this.gameOver || this.board[row][col] !== 0 || this.currentPlayer !== 1) return;
                
                this.makeMove(row, col);
                
                if (!this.gameOver) {
                    this.currentPlayer = 2;
                    this.updateStatus();
                    setTimeout(() => this.aiMove(), 500);
                }
            }

            makeMove(row, col) {
                this.board[row][col] = this.currentPlayer;
                this.moveHistory.push({row, col, player: this.currentPlayer});
                
                const cell = document.querySelector(`[data-row="${row}"][data-col="${col}"]`);
                const piece = document.createElement('div');
                piece.className = `piece ${this.currentPlayer === 1 ? 'black' : 'white'}`;
                
                if (this.lastMove) {
                    const lastCell = document.querySelector(`[data-row="${this.lastMove.row}"][data-col="${this.lastMove.col}"] .piece`);
                    if (lastCell) lastCell.classList.remove('last-move');
                }
                
                piece.classList.add('last-move');
                cell.appendChild(piece);
                this.lastMove = {row, col};
                
                if (this.checkWin(row, col)) {
                    this.gameOver = true;
                    const winner = this.currentPlayer === 1 ? '玩家' : 'AI';
                    this.updateStatus(`${winner}获胜！`);
                    this.recordGameResult(this.currentPlayer);
                    return;
                }
                
                if (this.moveHistory.length === this.boardSize * this.boardSize) {
                    this.gameOver = true;
                    this.updateStatus('平局！');
                    this.recordGameResult(0);
                    return;
                }
            }

            aiMove() {
                document.getElementById('thinkingIndicator').classList.add('active');
                
                setTimeout(() => {
                    const move = this.findBestMove();
                    this.makeMove(move.row, move.col);
                    
                    if (!this.gameOver) {
                        this.currentPlayer = 1;
                        this.updateStatus();
                    }
                    
                    document.getElementById('thinkingIndicator').classList.remove('active');
                    
                    if (this.learningEnabled) {
                        this.learnFromMove(move);
                    }
                }, 300);
            }

            findBestMove() {
                let bestScore = -Infinity;
                let bestMove = null;
                let moves = this.generateCandidateMoves();
                
                for (let depth = 2; depth <= 4; depth++) {
                    let currentBest = null;
                    let currentScore = -Infinity;
                    
                    for (let move of moves) {
                        this.board[move.row][move.col] = 2;
                        let score = this.alphaBeta(depth - 1, -Infinity, Infinity, false);
                        this.board[move.row][move.col] = 0;
                        
                        if (this.learningEnabled && this.knowledgeBase.positionValues[`${move.row},${move.col}`]) {
                            score += this.knowledgeBase.positionValues[`${move.row},${move.col}`] * 0.1;
                        }
                        
                        if (score > currentScore) {
                            currentScore = score;
                            currentBest = move;
                        }
                    }
                    
                    if (currentBest) {
                        bestMove = currentBest;
                        bestScore = currentScore;
                    }
                }
                
                return bestMove || moves[0];
            }

            alphaBeta(depth, alpha, beta, isMaximizing) {
                if (depth === 0) {
                    return this.evaluateBoard();
                }
                
                const moves = this.generateCandidateMoves();
                if (moves.length === 0) return 0;
                
                if (isMaximizing) {
                    let maxEval = -Infinity;
                    for (let move of moves) {
                        this.board[move.row][move.col] = 2;
                        let eval = this.alphaBeta(depth - 1, alpha, beta, false);
                        this.board[move.row][move.col] = 0;
                        
                        maxEval = Math.max(maxEval, eval);
                        alpha = Math.max(alpha, eval);
                        if (beta <= alpha) break;
                    }
                    return maxEval;
                } else {
                    let minEval = Infinity;
                    for (let move of moves) {
                        this.board[move.row][move.col] = 1;
                        let eval = this.alphaBeta(depth - 1, alpha, beta, true);
                        this.board[move.row][move.col] = 0;
                        
                        minEval = Math.min(minEval, eval);
                        beta = Math.min(beta, eval);
                        if (beta <= alpha) break;
                    }
                    return minEval;
                }
            }

            generateCandidateMoves() {
                const moves = [];
                const radius = 2;
                
                for (let i = 0; i < this.boardSize; i++) {
                    for (let j = 0; j < this.boardSize; j++) {
                        if (this.board[i][j] !== 0) {
                            for (let di = -radius; di <= radius; di++) {
                                for (let dj = -radius; dj <= radius; dj++) {
                                    const ni = i + di, nj = j + dj;
                                    if (ni >= 0 && ni < this.boardSize && nj >= 0 && nj < this.boardSize 
                                        && this.board[ni][nj] === 0) {
                                        const score = this.evaluatePosition(ni, nj);
                                        moves.push({row: ni, col: nj, score});
                                    }
                                }
                            }
                        }
                    }
                }
                
                const uniqueMoves = [];
                const seen = new Set();
                for (let move of moves) {
                    const key = `${move.row},${move.col}`;
                    if (!seen.has(key)) {
                        seen.add(key);
                        uniqueMoves.push(move);
                    }
                }
                
                return uniqueMoves.sort((a, b) => b.score - a.score).slice(0, 10);
            }

            evaluatePosition(row, col) {
                let score = 0;
                const center = Math.floor(this.boardSize / 2);
                const distToCenter = Math.abs(row - center) + Math.abs(col - center);
                score += (14 - distToCenter) * 10;
                
                const directions = [[1,0], [0,1], [1,1], [1,-1]];
                for (let [dx, dy] of directions) {
                    score += this.checkPatternScore(row, col, dx, dy, 2) * 2;
                    score += this.checkPatternScore(row, col, dx, dy, 1);
                }
                
                return score;
            }

            checkPatternScore(row, col, dx, dy, player) {
                let count = 1;
                let blocked = 0;
                
                for (let dir of [1, -1]) {
                    for (let i = 1; i < 5; i++) {
                        const r = row + dx * i * dir;
                        const c = col + dy * i * dir;
                        if (r < 0 || r >= this.boardSize || c < 0 || c >= this.boardSize) {
                            blocked++;
                            break;
                        }
                        if (this.board[r][c] === player) count++;
                        else if (this.board[r][c] === 0) break;
                        else {
                            blocked++;
                            break;
                        }
                    }
                }
                
                if (count >= 5) return this.patternScores.five;
                if (count === 4 && blocked === 0) return this.patternScores.open_four;
                if (count === 4 && blocked === 1) return this.patternScores.closed_four;
                if (count === 3 && blocked === 0) return this.patternScores.open_three;
                if (count === 3 && blocked === 1) return this.patternScores.closed_three;
                if (count === 2 && blocked === 0) return this.patternScores.open_two;
                
                return count * 10;
            }

            evaluateBoard() {
                let score = 0;
                for (let i = 0; i < this.boardSize; i++) {
                    for (let j = 0; j < this.boardSize; j++) {
                        if (this.board[i][j] === 2) score += this.evaluatePosition(i, j);
                        else if (this.board[i][j] === 1) score -= this.evaluatePosition(i, j) * 1.2;
                    }
                }
                return score;
            }

            checkWin(row, col) {
                const player = this.board[row][col];
                const directions = [[1,0], [0,1], [1,1], [1,-1]];
                
                for (let [dx, dy] of directions) {
                    let count = 1;
                    
                    for (let dir of [1, -1]) {
                        for (let i = 1; i < 5; i++) {
                            const r = row + dx * i * dir;
                            const c = col + dy * i * dir;
                            if (r >= 0 && r < this.boardSize && c >= 0 && c < this.boardSize 
                                && this.board[r][c] === player) {
                                count++;
                            } else break;
                        }
                    }
                    
                    if (count >= 5) return true;
                }
                return false;
            }

            learnFromMove(move) {
                const pattern = this.extractPattern(move);
                const key = JSON.stringify(pattern);
                
                if (!this.knowledgeBase.patterns[key]) {
                    this.knowledgeBase.patterns[key] = {
                        count: 0,
                        success: 0,
                        positions: []
                    };
                    this.learningStats.strategiesLearned++;
                }
                
                this.knowledgeBase.patterns[key].count++;
                this.knowledgeBase.patterns[key].positions.push({row: move.row, col: move.col});
                
                const posKey = `${move.row},${move.col}`;
                if (!this.knowledgeBase.positionValues[posKey]) {
                    this.knowledgeBase.positionValues[posKey] = 0;
                }
                this.knowledgeBase.positionValues[posKey] += 1;
                
                this.updateLearningDisplay();
                this.saveKnowledge();
            }

            extractPattern(move) {
                const features = [];
                const radius = 2;
                
                for (let i = -radius; i <= radius; i++) {
                    for (let j = -radius; j <= radius; j++) {
                        const r = move.row + i;
                        const c = move.col + j;
                        if (r >= 0 && r < this.boardSize && c >= 0 && c < this.boardSize) {
                            features.push(this.board[r][c]);
                        } else {
                            features.push(-1);
                        }
                    }
                }
                return features;
            }

            recordGameResult(winner) {
                this.learningStats.totalGames++;
                if (winner === 2) this.learningStats.aiWins++;
                else if (winner === 1) this.learningStats.playerWins++;
                else this.learningStats.draws++;
                
                if (this.learningEnabled && winner === 2) {
                    const recentMoves = this.moveHistory.slice(-5);
                    for (let move of recentMoves) {
                        if (move.player === 2) {
                            const posKey = `${move.row},${move.col}`;
                            this.knowledgeBase.positionValues[posKey] = (this.knowledgeBase.positionValues[posKey] || 0) + 10;
                        }
                    }
                }
                
                this.updateStats();
                this.saveKnowledge();
            }

            toggleLearning() {
                this.learningEnabled = !this.learningEnabled;
                const btn = document.getElementById('learningBtn');
                const status = document.getElementById('learningStatus');
                
                if (this.learningEnabled) {
                    btn.innerHTML = '<span>🛑</span> 禁用学习模式';
                    btn.classList.remove('btn-success');
                    btn.classList.add('btn-warning');
                    status.textContent = '已启用';
                    status.classList.remove('status-inactive');
                    status.classList.add('status-active');
                } else {
                    btn.innerHTML = '<span>🧠</span> 启用学习模式';
                    btn.classList.remove('btn-warning');
                    btn.classList.add('btn-success');
                    status.textContent = '已禁用';
                    status.classList.remove('status-active');
                    status.classList.add('status-inactive');
                }
            }

            trainAI() {
                let games = 0;
                const maxGames = 50;
                const trainInterval = setInterval(() => {
                    if (games >= maxGames) {
                        clearInterval(trainInterval);
                        alert(`训练完成！AI已完成${maxGames}局自我对弈训练。`);
                        this.updateStats();
                        return;
                    }
                    
                    this.simulateGame();
                    games++;
                    
                    const progress = (games / maxGames) * 100;
                    document.getElementById('progressBar').style.width = progress + '%';
                    document.getElementById('learningProgress').textContent = Math.floor(progress) + '%';
                }, 100);
            }

            simulateGame() {
                const tempBoard = Array(this.boardSize).fill().map(() => Array(this.boardSize).fill(0));
                let moves = 0;
                let current = 1;
                
                while (moves < 100) {
                    const empty = [];
                    for (let i = 0; i < this.boardSize; i++) {
                        for (let j = 0; j < this.boardSize; j++) {
                            if (tempBoard[i][j] === 0) empty.push({r: i, c: j});
                        }
                    }
                    if (empty.length === 0) break;
                    
                    const move = empty[Math.floor(Math.random() * empty.length)];
                    tempBoard[move.r][move.c] = current;
                    moves++;
                    current = 3 - current;
                }
                
                this.learningStats.totalGames++;
                this.learningStats.draws++;
            }

            resetKnowledge() {
                if (confirm('确定要重置AI的所有学习知识吗？这将清除所有统计数据。')) {
                    this.knowledgeBase = {
                        patterns: {},
                        positionValues: {},
                        strategies: [],
                        gameResults: []
                    };
                    this.learningStats = {
                        totalGames: 0,
                        aiWins: 0,
                        playerWins: 0,
                        draws: 0,
                        strategiesLearned: 0
                    };
                    this.saveKnowledge();
                    this.updateStats();
                    this.updateLearningDisplay();
                    alert('AI知识已重置！');
                }
            }

            newGame() {
                this.initBoard();
                this.currentPlayer = 1;
                this.gameOver = false;
                this.lastMove = null;
                this.moveHistory = [];
                this.updateStatus();
            }

            updateStatus(text) {
                const indicator = document.getElementById('turnIndicator');
                const statusText = document.getElementById('statusText');
                
                if (text) {
                    statusText.textContent = text;
                    return;
                }
                
                if (this.currentPlayer === 1) {
                    indicator.className = 'turn-indicator black';
                    statusText.textContent = '黑棋（玩家）思考中...';
                } else {
                    indicator.className = 'turn-indicator white';
                    statusText.textContent = '白棋（AI）思考中...';
                }
            }

            updateStats() {
                document.getElementById('totalGames').textContent = this.learningStats.totalGames;
                document.getElementById('aiWins').textContent = this.learningStats.aiWins;
                document.getElementById('playerWins').textContent = this.learningStats.playerWins;
                document.getElementById('draws').textContent = this.learningStats.draws;
                
                const rate = this.learningStats.totalGames > 0 
                    ? ((this.learningStats.aiWins / this.learningStats.totalGames) * 100).toFixed(1)
                    : 0;
                document.getElementById('aiWinRate').textContent = rate + '%';
            }

            updateLearningDisplay() {
                document.getElementById('strategyCount').textContent = this.learningStats.strategiesLearned;
            }

            saveKnowledge() {
                localStorage.setItem('gomokuAIKnowledge', JSON.stringify(this.knowledgeBase));
                localStorage.setItem('gomokuAIStats', JSON.stringify(this.learningStats));
            }

            loadKnowledge() {
                const saved = localStorage.getItem('gomokuAIKnowledge');
                const stats = localStorage.getItem('gomokuAIStats');
                
                if (saved) this.knowledgeBase = JSON.parse(saved);
                if (stats) {
                    this.learningStats = JSON.parse(stats);
                    this.updateStats();
                    this.updateLearningDisplay();
                }
            }
        }

        const game = new AdaptiveGomokuAI();
    </script>
</body>
</html>
